<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>休食组业绩看板</title>
<link rel="stylesheet" href="assets/style.css?v=20260519v13d">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>

<!-- 左侧 sidebar：品牌 + AM 视角选择器 -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <span class="emoji">🍫</span>
    <div>
      <h1>休食组看板</h1>
      <div class="subtitle">五组（休食）· 全员视角</div>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-title">👤 视角（AM）</div>
    <div class="am-list" id="am-buttons"></div>
  </div>
  <div class="sidebar-section sidebar-meta">
    <div id="am-info" class="muted-mini"></div>
    <div id="generated-at" class="muted-mini">--</div>
  </div>
  <div class="sidebar-footer muted-mini">
    数据源：RedBI 1922/2479/5574 · 沿用 REDoc 5.11 取数规划
  </div>
</aside>

<!-- 移动端：sidebar 折叠抽屉触发按钮 -->
<button class="sidebar-toggle" id="sidebar-toggle" aria-label="切换视角">☰ 视角</button>

<!-- 主内容区域 -->
<div class="main-wrap">
  <!-- 顶部：时段栏 -->
  <nav class="topbar-v2">
    <div class="period-row">
      <span class="period-label-v2">📅 时段</span>
      <div class="period-buttons" id="period-buttons"></div>
      <div class="custom-range" id="custom-range">
        <span class="muted-mini">或自定义：</span>
        <input type="date" id="custom-start" />
        <span>~</span>
        <input type="date" id="custom-end" />
        <button id="custom-apply">应用</button>
      </div>
      <div class="period-info-v2" id="period-info"></div>
    </div>
    <div class="tab-row">
      <div class="tab-bar" id="tab-bar"></div>
    </div>
  </nav>

  <main id="main-content">
    <div class="loading">加载中…</div>
  </main>

  <footer>
    <span>问题反馈 → 大门(朱锦程)</span>
  </footer>
</div>

<script src="assets/app.js?v=20260519v13d"></script>
</body>
</html>

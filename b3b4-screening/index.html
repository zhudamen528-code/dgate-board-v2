<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>休食组 B3/B4 商家信号筛选</title>
<link rel="stylesheet" href="assets/style.css?v=20260527v1">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="emoji">🎯</span>
    <div>
      <h1>休食组 B3/B4 商家信号筛选</h1>
      <div class="subtitle">五组（休食） · 4 维信号体系 · 周更 T-1</div>
    </div>
  </div>
  <div class="meta-info">
    <span id="snapshot">--</span>
    <span class="dot">·</span>
    <span id="pool-info">--</span>
    <span class="dot">·</span>
    <span id="version">--</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" data-tab="tracks">🌱 赛道清单</button>
  <button class="tab" data-tab="sellers">🎯 重点商家</button>
  <button class="tab" data-tab="dict">📊 信号字典</button>
</nav>

<main class="content">

  <!-- Tab 1: 赛道清单 -->
  <section class="tab-panel active" id="panel-tracks">
    <div class="two-col">
      <div class="col">
        <h2>📈 增长赛道（环比 ≥ +10%）</h2>
        <p class="hint">大盘在涨，B3/B4 抢占好时机</p>
        <div id="growth-list" class="track-list"></div>
      </div>
      <div class="col">
        <h2>📉 衰退赛道·黑马候选（环比 ≤ -10% 但池里有黑马）</h2>
        <p class="hint">大盘洗牌期，里面有反向跃迁的黑马商家</p>
        <div id="decline-list" class="track-list"></div>
      </div>
    </div>
    <div class="track-detail-modal" id="track-detail" style="display:none">
      <div class="modal-overlay" onclick="closeTrackDetail()"></div>
      <div class="modal-body">
        <button class="modal-close" onclick="closeTrackDetail()">✕</button>
        <div id="track-detail-content"></div>
      </div>
    </div>
  </section>

  <!-- Tab 2: 商家清单 -->
  <section class="tab-panel" id="panel-sellers">
    <div class="grade-switch">
      <button class="grade-btn active" data-grade="S">⭐ S 必看（<span id="cnt-s">0</span>）</button>
      <button class="grade-btn" data-grade="A">A 排期（<span id="cnt-a">0</span>）</button>
      <button class="grade-btn" data-grade="B">B 自动化（<span id="cnt-b">0</span>）</button>
    </div>

    <div class="filter-bar">
      <select id="filter-am"><option value="">全部 AM</option></select>
      <select id="filter-quadrant">
        <option value="">全部象限</option>
        <option value="🌟 优等生">🌟 优等生</option>
        <option value="⚡ 黑马">⚡ 黑马</option>
        <option value="⚡ 黑马(待激活)">⚡ 黑马(待激活)</option>
        <option value="🐢 慢热">🐢 慢热</option>
        <option value="· 中间态">· 中间态</option>
        <option value="⚠️ 待观察">⚠️ 待观察</option>
      </select>
      <select id="filter-cat"><option value="">全部类目</option></select>
      <select id="filter-layer">
        <option value="">全部 B 层</option>
        <option value="B3">B3 [1万,10万)</option>
        <option value="B4">B4 [10万,50万)</option>
      </select>
      <input type="text" id="filter-search" placeholder="🔍 商家名搜索...">
      <span class="filter-cnt">显示 <span id="filter-result-cnt">0</span> / <span id="filter-total-cnt">0</span></span>
    </div>

    <div id="seller-cards" class="card-grid"></div>
  </section>

  <!-- Tab 3: 信号字典 -->
  <section class="tab-panel" id="panel-dict">
    <div id="dict-content"></div>
  </section>

</main>

<footer class="footer">
  <span>数据源：RedBI dataset 1922 + 2479 + 28963 + 类目矩阵</span>
  <span class="dot">·</span>
  <span>取数口径：近30天 GMV (T-1) + 当期信号切片</span>
  <span class="dot">·</span>
  <span>更新频率：每周一早 8:00 自动刷新</span>
</footer>

<script src="assets/app.js?v=20260527v1"></script>
</body>
</html>
